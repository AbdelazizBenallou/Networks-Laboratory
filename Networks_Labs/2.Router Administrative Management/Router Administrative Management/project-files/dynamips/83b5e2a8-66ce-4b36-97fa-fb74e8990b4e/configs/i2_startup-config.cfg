!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
!
hostname HQ-RTR
!
boot-start-marker
boot-end-marker
!
security passwords min-length 8
enable secret 5 $1$uFKF$aufjskNYpUWttsh8Oyfdq0
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
!
!
ip cef
no ip domain lookup
ip domain name HQ
!
!
login block-for 120 attempts 2 within 30
login on-failure log
login on-success log
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
username User2 privilege 15 secret 5 $1$Bf9N$vC4FAQKdbbLR3uYBwwrt30
!
!
ip tcp synwait-time 5
ip ssh version 2
! 
!
!
!
!
interface FastEthernet0/0
 description link to local LAN 
 ip address 192.168.1.254 255.255.255.0
 duplex auto
 speed auto
 no cdp enable
!
interface FastEthernet1/0
 description link to ISP-RTR on interface fa1/0
 ip address 172.16.3.1 255.255.255.252
 duplex auto
 speed auto
 no cdp enable
!
interface Ethernet2/0
 no ip address
 shutdown
 half-duplex
!
interface Ethernet2/1
 no ip address
 shutdown
 half-duplex
!
interface Ethernet2/2
 no ip address
 shutdown
 half-duplex
!
interface Ethernet2/3
 no ip address
 shutdown
 half-duplex
!
interface Serial3/0
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial3/1
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial3/2
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial3/3
 no ip address
 shutdown
 serial restart-delay 0
!
no ip http server
no ip http secure-server
!
!
!
!
no cdp log mismatch duplex
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 logging synchronous
 login local
 transport input ssh
line vty 5 15
 logging synchronous
 login local
 transport input ssh
!
!
end
