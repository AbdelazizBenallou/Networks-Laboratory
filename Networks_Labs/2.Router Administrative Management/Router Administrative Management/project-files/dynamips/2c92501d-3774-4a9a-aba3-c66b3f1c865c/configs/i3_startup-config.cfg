!

!
version 12.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption
!
hostname ISP-ROUTER
!
boot-start-marker
boot-end-marker
!
security passwords min-length 8
enable secret 5 $1$z.0G$4UXWieji944DgBCq.LYAH0
!
no aaa new-model
memory-size iomem 5
no ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip domain name ISP
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
login block-for 120 attempts 2 within 30
login on-failure log
login on-success log
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
username User1 privilege 15 secret 5 $1$6WOJ$ebgnfGtsKPleVutSjfbya1
!
!
ip tcp synwait-time 5
ip ssh logging events
ip ssh version 2
! 
!
!
!
!
interface FastEthernet0/0
 description link to local LAN
 ip address 172.16.2.254 255.255.255.0
 duplex auto
 speed auto
 no cdp enable
!
interface FastEthernet0/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet1/0
 description Link to HQ-RTR on fa1/0
 ip address 172.16.3.2 255.255.255.252
 duplex auto
 speed auto
 no cdp enable
!
interface Serial2/0
 description link to Internet
 ip address 203.25.11.1 255.255.255.252
 serial restart-delay 0
 clock rate 64000
 no cdp enable
!
interface Serial2/1
 description link to BR-RTR on se3/0 interface
 ip address 10.10.10.1 255.255.255.252
 serial restart-delay 0
 clock rate 64000
 no cdp enable
!
interface Serial2/2
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial2/3
 no ip address
 shutdown
 serial restart-delay 0
!
ip forward-protocol nd
ip route 0.0.0.0 0.0.0.0 203.25.11.2
!
!
no ip http server
no ip http secure-server
!
!
no cdp log mismatch duplex
no cdp run
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 login local
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 logging synchronous
 login local
 transport input ssh
line vty 5 15
 logging synchronous
 login local
 transport input ssh
!
!
end
