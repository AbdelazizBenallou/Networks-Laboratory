!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname RW-02
!
boot-start-marker
boot-end-marker
!
logging message-counter syslog
enable secret 5 $1$k/5e$yeeVngxkq0eX4DNS164891
!
no aaa new-model
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
ip dhcp excluded-address 192.168.5.100 192.168.5.200
!
ip dhcp pool 1
   network 192.168.5.0 255.255.255.0
   default-router 192.168.5.254 
!
!
no ip domain lookup
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 description link to local LAN 
 ip address 192.168.5.254 255.255.255.0
 duplex half
!
interface FastEthernet1/0
 description link to RW-02 interface fa1/0
 ip address 172.16.16.254 255.255.255.0
 duplex auto
 speed auto
!
interface FastEthernet1/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface Serial2/0
 description to ISP-ROUTER interface se2/0
 ip address 11.25.127.2 255.255.255.252
 serial restart-delay 0
!
interface Serial2/1
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial2/2
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial2/3
 no ip address
 shutdown
 serial restart-delay 0
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 password cisco
 logging synchronous
 login
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 exec-timeout 1 0
 password cisco
 logging synchronous
 login
line vty 5 15
 exec-timeout 1 0
 password cisco
 logging synchronous
 login
!
end
